name: homepod_assistant
description: A HomePod-style smart assistant for Raspberry Pi with 6-inch round display
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP and Networking
  http: ^1.1.0
  js: ^0.6.7

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # UI and Graphics
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  lottie: ^2.7.0

  # Utilities
  intl: ^0.18.1
  geolocator: ^10.1.0
  weather: ^3.1.1

  # Connectivity and Background Tasks
  connectivity_plus: ^5.0.2
  workmanager: ^0.5.2

  # Notifications
  flutter_local_notifications: ^16.3.0

  # MQTT for Smart Home
  mqtt_client: ^10.0.0

  # QR Codes and Charts
  qr_flutter: ^4.1.0
  fl_chart: ^0.65.0

  # Audio and Voice
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  permission_handler: ^11.1.0

  # System Integration
  screen_brightness: ^0.2.0
  volume_controller: ^2.0.0
  network_info_plus: ^4.0.0
  device_info_plus: ^9.0.0
  package_info_plus: ^4.0.0

  # Spotify Integration (temporarily disabled for testing)
  # spotify_sdk: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/sounds/

